name: Pages Workflow
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: release
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.pages-deploy.outputs.page_url }}
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
      - name: Inject
        env:
          AAEAD9: ${{ secrets.AAEAD9 }}
          B3BD4A: ${{ secrets.B3BD4A }}
        run: |
          sudo chown -R "$(id -u):$(id -g)" ./_site
          python3 -c "
          import os, sys, pathlib
          tag_a = os.environ.get('AAEAD9', '')
          tag_b = os.environ.get('B3BD4A', '')
          n = 0
          for fpath in pathlib.Path('_site').rglob('*.html'):
              try:
                  orig = fpath.read_text(encoding='utf-8')
              except (OSError, UnicodeDecodeError):
                  continue
              updated = orig
              if tag_a:
                  updated = updated.replace('<!-- 90a1facf3e2d0212d390859c6448c693d5cbfc5bab2e7b -->', tag_a)
              if tag_b:
                  updated = updated.replace('<!-- 258de868198d504642d7561719b07652bff1 -->', tag_b)
              if updated != orig:
                  fpath.write_text(updated, encoding='utf-8')
                  n += 1
          if n == 0 and (tag_a or tag_b):
              sys.exit(1)
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: pages-deploy
        uses: actions/deploy-pages@v4
